services:
  shelfrat:
    # image: ghcr.io/tldev/shelfrat:latest
    build: .
    container_name: shelfrat
    ports:
      - "3000:3000"
    volumes:
      - data:/data
      - ${HOST_LIBRARY_PATH:?Set HOST_LIBRARY_PATH in .env}:/library:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - DATABASE_URL=sqlite:/data/shelfrat.db
      - LIBRARY_PATH=/library
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  data:
